# Render Blueprint — ÖZDEMİR TesisatTeklifApp
# Render panelinde "New + → Blueprint" ile bu repoyu seçince otomatik okunur.
services:
  - type: web
    name: ozdemir-tesisat
    runtime: docker
    plan: starter              # Ücretli: uyumaz (free planda 15 dk sonra uykuya geçip 30-60 sn açılıyordu)
    region: frankfurt          # Türkiye'ye en yakın bölge (hız için kritik). DİKKAT: mevcut
                               # servisin bölgesi DEĞİŞTİRİLEMEZ; Frankfurt için servis yeniden kurulur.
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DatabaseProvider
        value: Postgres
      - key: ConnectionStrings__DefaultConnection
        sync: false   # Neon bağlantı dizesini panelden gir (gizli)
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
